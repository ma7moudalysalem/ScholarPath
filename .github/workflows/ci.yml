name: CI

on:
  push:
    branches: [main, integration]
  pull_request:
    branches: [main, integration]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "22"

jobs:
  # ─── Detect which parts of the repo changed ──────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'server/**'
              - '.github/workflows/ci.yml'
            client:
              - 'client/**'
              - '.github/workflows/ci.yml'

  # ─── Backend: restore + build + unit tests ───────────────────────────
  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore server/ScholarPath.slnx

      - name: Format check
        run: dotnet format server/ScholarPath.slnx --verify-no-changes --severity error
        continue-on-error: true

      - name: Build
        run: dotnet build server/ScholarPath.slnx --no-restore --configuration Release

      # Unit tests only — fast and Docker-free. Integration tests use
      # Testcontainers (see the optional integration job below).
      - name: Test (unit)
        run: >
          dotnet test server/tests/ScholarPath.UnitTests/ScholarPath.UnitTests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory ./TestResults
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: "**/TestResults/**/*.trx"
          retention-days: 7

  # ─── Integration tests (Testcontainers — needs Docker) ───────────────
  # Gated: only runs on push to main/integration, not on every PR, to keep
  # PR feedback fast. ubuntu-latest runners ship with Docker preinstalled,
  # so Testcontainers spins up SQL Server itself.
  integration:
    needs: [changes, backend]
    if: >
      needs.changes.outputs.backend == 'true' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore server/ScholarPath.slnx

      - name: Build
        run: dotnet build server/ScholarPath.slnx --no-restore --configuration Release

      - name: Test (integration)
        run: >
          dotnet test server/tests/ScholarPath.IntegrationTests/ScholarPath.IntegrationTests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory ./TestResults
        # Integration tests are environment-sensitive; don't block CI on
        # transient container failures, but still surface the results.
        continue-on-error: true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: "**/TestResults/**/*.trx"
          retention-days: 7

  # ─── Client: install + lint + typecheck + test + build ───────────────
  client:
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload client build
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  # ─── Aggregate status — single required check for branch protection ──
  status:
    needs: [backend, integration, client]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report CI outcome
        run: |
          echo "Backend:     ${{ needs.backend.result }}"
          echo "Integration: ${{ needs.integration.result }}"
          echo "Client:      ${{ needs.client.result }}"
          # Fail the aggregate check if a non-skipped job failed.
          # Integration tests run with continue-on-error, so they never
          # report 'failure' here — they are informational only.
          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.client.result }}" == "failure" ]]; then
            echo "::error::A required CI job failed."
            exit 1
          fi
          echo "CI passed."

name: dbt-docs

# PB-016 T-007 — Publish the dbt documentation site to GitHub Pages whenever
# the analytics/dbt models change, or on a manual trigger.
#
# The generated site lives at:
#   https://<org>.github.io/<repo>/dbt-docs/
# (GitHub Pages must be enabled on the repo with source = gh-pages branch.)

on:
  push:
    branches: [main]
    paths:
      - "analytics/dbt/**"
      - ".github/workflows/dbt-docs.yml"
  workflow_dispatch:      # Manual trigger from the Actions tab

permissions:
  contents: write         # needed to push to gh-pages

concurrency:
  group: dbt-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-and-publish:
    name: dbt docs generate → GitHub Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics/dbt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: analytics/dbt/requirements.txt

      # ── System dependency: ODBC driver for dbt-sqlserver ──────────────
      - name: Install ODBC driver
        run: |
          sudo curl -sSL -O https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y -qq msodbcsql18 unixodbc-dev

      - name: Install dbt + adapter
        run: pip install -r requirements.txt

      - name: dbt deps
        run: dbt deps

      # ── Stub profile: dbt docs generate only needs to parse, not connect ─
      - name: Seed stub dbt profile (parse only — no DB connection needed)
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<'EOF'
          scholarpath:
            target: parse_stub
            outputs:
              parse_stub:
                type: sqlserver
                driver: "ODBC Driver 18 for SQL Server"
                server: "stub.local"
                port: 1433
                database: "stub"
                schema: "dbo"
                authentication: sql
                user: "stub"
                password: "Stub!Pass1"
                encrypt: false
                trust_cert: true
                threads: 1
          EOF

      # ── Generate docs (static assets: manifest.json + catalog.json + index.html) ──
      - name: dbt docs generate
        run: dbt docs generate --no-compile

      # ── Publish to gh-pages branch under /dbt-docs/ ───────────────────
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: analytics/dbt/target
          destination_dir: dbt-docs
          # Keep other files already on gh-pages (e.g. other docs).
          keep_files: true
          commit_message: "docs(dbt): regenerate dbt docs [skip ci]"

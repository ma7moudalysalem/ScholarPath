name: Deploy

# Deploys the API to Azure App Service and the client to Azure Static Web
# Apps. Triggered MANUALLY only — via the "Run workflow" button
# (workflow_dispatch). Provision Azure and configure the secrets/variables
# below BEFORE the first run (see docs/deployment.md). The workflow is
# intentionally NOT wired to `push` so ordinary commits never fire a
# deployment against infrastructure that does not exist yet.
#
# Required GitHub configuration (see docs/deployment.md):
#   Secrets:
#     AZURE_CLIENT_ID                   - app registration (OIDC federated credential)
#     AZURE_TENANT_ID                   - Entra ID tenant
#     AZURE_SUBSCRIPTION_ID             - target subscription
#     AZURE_STATIC_WEB_APPS_API_TOKEN   - deployment token of the Static Web App
#     VITE_STRIPE_PUBLISHABLE_KEY       - Stripe publishable (pk_...) key for the client build
#   Variables:
#     AZURE_API_APP_NAME                - App Service name for the API
#     VITE_API_BASE_URL                 - public URL of the deployed API
#     VITE_GOOGLE_CLIENT_ID             - Google OAuth client id (client build)
#     VITE_MICROSOFT_CLIENT_ID          - Microsoft OAuth client id (client build)
#
# OIDC login means no client secret is stored in GitHub — the App
# Registration trusts this repo's workflow via a federated credential.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [staging, production]

# `azure/login` with OIDC needs id-token: write.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "22"
  # Run JavaScript-based actions that still declare Node 20 (checkout,
  # setup-node, setup-dotnet, azure/login) on Node 24. GitHub forces this by
  # default from June 2026; opting in now clears the deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Build + publish + deploy the .NET API ───────────────────────────
  deploy-api:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore server/src/ScholarPath.API/ScholarPath.API.csproj

      - name: Publish API
        run: >
          dotnet publish server/src/ScholarPath.API/ScholarPath.API.csproj
          --configuration Release
          --no-restore
          --output ${{ github.workspace }}/publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Set the Azure OpenAI connection settings on every deploy so the AI
      # chat / embeddings keep working without hand-managing App Service
      # configuration. The API key is NOT stored in App Service as plaintext:
      # it lives in Azure Key Vault, and the App Service references it via a
      # `@Microsoft.KeyVault(SecretUri=...)` value resolved at runtime by the
      # App Service's managed identity. That reference string (non-secret) is
      # held in the `AI_AZURE_OPENAI_API_KEY_REF` repo variable. The step skips
      # silently when the endpoint or reference is empty (e.g. a staging
      # environment without an Azure OpenAI resource).
      - name: Sync Azure OpenAI app settings
        env:
          AI_AZURE_OPENAI_ENDPOINT: ${{ secrets.AI_AZURE_OPENAI_ENDPOINT }}
          AI_AZURE_OPENAI_API_KEY_REF: ${{ vars.AI_AZURE_OPENAI_API_KEY_REF }}
        run: |
          if [ -z "$AI_AZURE_OPENAI_ENDPOINT" ] || [ -z "$AI_AZURE_OPENAI_API_KEY_REF" ]; then
            echo "Skipping Azure OpenAI sync — endpoint or Key Vault reference not configured."
            exit 0
          fi
          rg=$(az webapp list --query "[?name=='${{ vars.AZURE_API_APP_NAME }}'] | [0].resourceGroup" -o tsv)
          if [ -z "$rg" ]; then
            echo "Could not resolve resource group for ${{ vars.AZURE_API_APP_NAME }}."
            exit 1
          fi
          echo "Resolved resource group: $rg"
          # Quote the Key Vault reference so the parentheses survive the shell.
          az webapp config appsettings set \
            --name "${{ vars.AZURE_API_APP_NAME }}" \
            --resource-group "$rg" \
            --settings \
              "Ai__Provider=AzureOpenAi" \
              "Ai__AzureOpenAi__Endpoint=$AI_AZURE_OPENAI_ENDPOINT" \
              "Ai__AzureOpenAi__ApiKey=$AI_AZURE_OPENAI_API_KEY_REF" \
            --output none

      # The API's CORS policy reads allowed origins from
      # `Cors:AllowedOrigins`. In production, the SWA URL must be in that
      # list — otherwise the admin dashboard requests get CORS-blocked.
      # ASP.NET Core parses Cors__AllowedOrigins__0 as an array element, so
      # we set indexed keys for every entry. localhost stays in
      # appsettings.json for dev; this step adds production origins on top.
      - name: Sync CORS allowed origins
        env:
          CLIENT_ORIGIN_URL: ${{ vars.CLIENT_ORIGIN_URL }}
        run: |
          if [ -z "$CLIENT_ORIGIN_URL" ]; then
            echo "Skipping CORS sync — CLIENT_ORIGIN_URL not configured for this environment."
            exit 0
          fi
          rg=$(az webapp list --query "[?name=='${{ vars.AZURE_API_APP_NAME }}'] | [0].resourceGroup" -o tsv)
          if [ -z "$rg" ]; then
            echo "Could not resolve resource group for ${{ vars.AZURE_API_APP_NAME }}."
            exit 1
          fi
          # Index 0 = the production SWA URL. Index 1+ can be added later for
          # custom domains. localhost entries from appsettings.json stay live
          # for dev/preview because configuration sources are merged, not
          # replaced.
          az webapp config appsettings set \
            --name "${{ vars.AZURE_API_APP_NAME }}" \
            --resource-group "$rg" \
            --settings \
              "Cors__AllowedOrigins__0=$CLIENT_ORIGIN_URL" \
            --output none

      # Sync the secret-backed integration settings the app needs in prod. Each
      # is applied only when its secret is provided, so an environment without
      # (say) Stripe keeps the stub. Values come from Secrets — never hard-coded.
      # SSO is the one that unblocks Google/Microsoft sign-in: without these the
      # API falls back to StubSsoService and builds an invalid consent URL.
      # The Google/Microsoft client IDs already exist as the VITE_*_CLIENT_ID
      # repo variables (reused here for the backend), so you only need to add the
      # two CLIENT SECRETS. Required Secrets (set the ones you use):
      #   AUTH_GOOGLE_CLIENT_SECRET · AUTH_MICROSOFT_CLIENT_SECRET
      #   STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET / STRIPE_CONNECT_CLIENT_ID
      #   SENDGRID_API_KEY · ACS_CONNECTION_STRING
      - name: Sync auth + integration app settings
        env:
          AUTH_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}
          AUTH_MICROSOFT_CLIENT_ID: ${{ vars.VITE_MICROSOFT_CLIENT_ID }}
          AUTH_MICROSOFT_CLIENT_SECRET: ${{ secrets.AUTH_MICROSOFT_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_CONNECT_CLIENT_ID: ${{ secrets.STRIPE_CONNECT_CLIENT_ID }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          ACS_CONNECTION_STRING: ${{ secrets.ACS_CONNECTION_STRING }}
        run: |
          rg=$(az webapp list --query "[?name=='${{ vars.AZURE_API_APP_NAME }}'] | [0].resourceGroup" -o tsv)
          if [ -z "$rg" ]; then
            echo "Could not resolve resource group for ${{ vars.AZURE_API_APP_NAME }}."
            exit 1
          fi

          settings=()
          # Apply a provider only when its client SECRET is supplied (the IDs
          # always come from the VITE_* vars), so a half-config is never written.
          if [ -n "$AUTH_GOOGLE_CLIENT_SECRET" ] && [ -n "$AUTH_GOOGLE_CLIENT_ID" ]; then
            settings+=("Authentication__Google__ClientId=$AUTH_GOOGLE_CLIENT_ID" "Authentication__Google__ClientSecret=$AUTH_GOOGLE_CLIENT_SECRET")
          fi
          if [ -n "$AUTH_MICROSOFT_CLIENT_SECRET" ] && [ -n "$AUTH_MICROSOFT_CLIENT_ID" ]; then
            settings+=("Authentication__Microsoft__ClientId=$AUTH_MICROSOFT_CLIENT_ID" "Authentication__Microsoft__ClientSecret=$AUTH_MICROSOFT_CLIENT_SECRET")
          fi
          if [ -n "$STRIPE_SECRET_KEY" ];        then settings+=("Stripe__SecretKey=$STRIPE_SECRET_KEY"); fi
          if [ -n "$STRIPE_WEBHOOK_SECRET" ];    then settings+=("Stripe__WebhookSecret=$STRIPE_WEBHOOK_SECRET"); fi
          if [ -n "$STRIPE_CONNECT_CLIENT_ID" ]; then settings+=("Stripe__ConnectClientId=$STRIPE_CONNECT_CLIENT_ID"); fi
          if [ -n "$SENDGRID_API_KEY" ];         then settings+=("Email__Provider=SendGrid" "Email__SendGrid__ApiKey=$SENDGRID_API_KEY"); fi
          if [ -n "$ACS_CONNECTION_STRING" ];    then settings+=("Acs__ConnectionString=$ACS_CONNECTION_STRING"); fi

          if [ ${#settings[@]} -eq 0 ]; then
            echo "No auth/integration secrets configured — skipping (stubs stay active)."
            exit 0
          fi
          az webapp config appsettings set \
            --name "${{ vars.AZURE_API_APP_NAME }}" \
            --resource-group "$rg" \
            --settings "${settings[@]}" \
            --output none
          echo "Applied ${#settings[@]} integration app setting(s)."

      # CRITICAL — reliable deploy on Linux App Service (Azure Files):
      #
      # The running app holds its loaded *.dll open on the Azure Files (SMB)
      # /home share, which does NOT support overwriting/deleting an open file.
      # A live rsync deploy therefore fails to replace ScholarPath.*.dll (rsync
      # exit 23) and the API silently keeps serving STALE code — verified in
      # prod: server fixes did not go live. (Do NOT try to pre-delete the DLLs
      # either — on Azure Files a delete-while-open leaves the path in a locked
      # "pending delete" limbo that nothing can recreate until the app stops.)
      #
      # The only reliable fix: STOP the app (releases the SMB handles), deploy
      # into the now-free wwwroot, then START. Kudu/SCM stays reachable while the
      # app is stopped, so the deploy still works. Costs ~1-2 min of downtime per
      # (manual) deploy in exchange for the code actually landing.
      - name: Package publish output as a zip
        run: |
          cd ${{ github.workspace }}/publish
          zip -r -q ${{ github.workspace }}/api.zip .

      - name: Deploy to Azure App Service (stop → deploy → start)
        run: |
          APP="${{ vars.AZURE_API_APP_NAME }}"
          RG=$(az webapp list --query "[?name=='$APP'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then echo "Could not resolve resource group for $APP."; exit 1; fi

          echo "::group::Stop $APP (release Azure Files assembly locks)"
          az webapp stop --name "$APP" --resource-group "$RG"
          sleep 10
          echo "::endgroup::"

          echo "::group::Deploy while stopped via Kudu OneDeploy"
          # Use the Kudu OneDeploy REST API directly, NOT `az webapp deploy`: the
          # CLI keeps polling the STOPPED app for warmup even after the file
          # deployment has finished, so it never returns and the job hangs with
          # the app down. curl to /api/publish (async) returns as soon as the
          # upload is queued; we then poll the deployment record for completion.
          token=$(az account get-access-token --resource https://management.azure.com --query accessToken -o tsv)
          latest="https://$APP.scm.azurewebsites.net/api/deployments/latest"
          prev=$(curl -s "$latest" -H "Authorization: Bearer $token" | grep -oE '"id":"[^"]+"' | head -1 | cut -d'"' -f4)

          http=$(curl -s -o /tmp/pub.txt -w "%{http_code}" --max-time 240 -X POST \
            "https://$APP.scm.azurewebsites.net/api/publish?type=zip&clean=false&restart=false&async=true" \
            -H "Authorization: Bearer $token" -H "Content-Type: application/zip" \
            --data-binary @"${{ github.workspace }}/api.zip" || echo "000")
          echo "OneDeploy queued: HTTP $http"; head -c 400 /tmp/pub.txt 2>/dev/null || true; echo ""

          # Poll for the NEW deployment (id != prev) to complete — id-tracking
          # avoids matching the previous deploy's stale complete:true.
          ok=0; status=""
          for i in $(seq 1 45); do
            body=$(curl -s "$latest" -H "Authorization: Bearer $token")
            id=$(echo "$body" | grep -oE '"id":"[^"]+"' | head -1 | cut -d'"' -f4)
            if [ "$id" != "$prev" ] && echo "$body" | grep -q '"complete":true'; then
              status=$(echo "$body" | grep -oE '"status":[0-9]+' | grep -oE '[0-9]+' | head -1)
              ok=1; echo "deployment complete (poll $i, status=$status)"; break
            fi
            echo "…deploying (poll $i)"; sleep 8
          done
          echo "::endgroup::"

          echo "::group::Start $APP"
          az webapp start --name "$APP" --resource-group "$RG"
          echo "::endgroup::"

          # status 4 = success. The app is started either way so it can recover,
          # but a non-success deployment fails the job so it's visible.
          if [ "$ok" != "1" ] || [ "$status" != "4" ]; then
            echo "Deployment did not report success (ok=$ok status=$status)."; exit 1
          fi

      - name: Verify API is healthy after deploy
        run: |
          url="https://${{ vars.AZURE_API_APP_NAME }}.azurewebsites.net/health"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)
            echo "health poll $i: $code"
            [ "$code" = "200" ] && ok=$((ok+1)) || ok=0
            [ "${ok:-0}" -ge 3 ] && { echo "API healthy."; exit 0; }
            sleep 10
          done
          echo "API did not become healthy in time."; exit 1

      - name: Azure logout
        if: always()
        run: az logout
        continue-on-error: true

  # ─── Build + deploy the React client ─────────────────────────────────
  deploy-client:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_MICROSOFT_CLIENT_ID: ${{ vars.VITE_MICROSOFT_CLIENT_ID }}
          VITE_APP_ENV: production
        run: npm run build

      # Static Web Apps deploy uses the SWA deployment token directly —
      # no azure/login needed. `skip_app_build` because we already built
      # the client above with the production VITE_* env vars.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client/dist
          skip_app_build: true
          output_location: ""

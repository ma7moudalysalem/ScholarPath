name: Deploy

# Deploys the API to Azure App Service and the client to Azure Static Web
# Apps. Triggered MANUALLY only — via the "Run workflow" button
# (workflow_dispatch). Provision Azure and configure the secrets/variables
# below BEFORE the first run (see docs/deployment.md). The workflow is
# intentionally NOT wired to `push` so ordinary commits never fire a
# deployment against infrastructure that does not exist yet.
#
# Required GitHub configuration (see docs/deployment.md):
#   Secrets:
#     AZURE_CLIENT_ID                   - app registration (OIDC federated credential)
#     AZURE_TENANT_ID                   - Entra ID tenant
#     AZURE_SUBSCRIPTION_ID             - target subscription
#     AZURE_STATIC_WEB_APPS_API_TOKEN   - deployment token of the Static Web App
#     VITE_STRIPE_PUBLISHABLE_KEY       - Stripe publishable (pk_...) key for the client build
#   Variables:
#     AZURE_API_APP_NAME                - App Service name for the API
#     VITE_API_BASE_URL                 - public URL of the deployed API
#     VITE_GOOGLE_CLIENT_ID             - Google OAuth client id (client build)
#     VITE_MICROSOFT_CLIENT_ID          - Microsoft OAuth client id (client build)
#
# OIDC login means no client secret is stored in GitHub — the App
# Registration trusts this repo's workflow via a federated credential.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [staging, production]

# `azure/login` with OIDC needs id-token: write.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "22"
  # Run JavaScript-based actions that still declare Node 20 (checkout,
  # setup-node, setup-dotnet, azure/login) on Node 24. GitHub forces this by
  # default from June 2026; opting in now clears the deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Build + publish + deploy the .NET API ───────────────────────────
  deploy-api:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore server/src/ScholarPath.API/ScholarPath.API.csproj

      - name: Publish API
        run: >
          dotnet publish server/src/ScholarPath.API/ScholarPath.API.csproj
          --configuration Release
          --no-restore
          --output ${{ github.workspace }}/publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Set the Azure OpenAI connection settings on every deploy so the AI
      # chat / embeddings keep working without hand-managing App Service
      # configuration. The two secrets are populated via `gh secret set`
      # and re-applied here using the same OIDC login. The step skips
      # silently when either secret is empty (e.g. a staging environment
      # without an Azure OpenAI resource) — GitHub Actions disallows
      # `secrets.*` in `if:` expressions, so we surface them as env vars
      # and short-circuit in the script.
      - name: Sync Azure OpenAI app settings
        env:
          AI_AZURE_OPENAI_ENDPOINT: ${{ secrets.AI_AZURE_OPENAI_ENDPOINT }}
          AI_AZURE_OPENAI_API_KEY: ${{ secrets.AI_AZURE_OPENAI_API_KEY }}
        run: |
          if [ -z "$AI_AZURE_OPENAI_ENDPOINT" ] || [ -z "$AI_AZURE_OPENAI_API_KEY" ]; then
            echo "Skipping Azure OpenAI sync — secrets not configured for this environment."
            exit 0
          fi
          rg=$(az webapp show --name "${{ vars.AZURE_API_APP_NAME }}" --query resourceGroup -o tsv)
          az webapp config appsettings set \
            --name "${{ vars.AZURE_API_APP_NAME }}" \
            --resource-group "$rg" \
            --settings \
              "Ai__Provider=AzureOpenAi" \
              "Ai__AzureOpenAi__Endpoint=$AI_AZURE_OPENAI_ENDPOINT" \
              "Ai__AzureOpenAi__ApiKey=$AI_AZURE_OPENAI_API_KEY" \
            --output none

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_API_APP_NAME }}
          package: ${{ github.workspace }}/publish

      - name: Azure logout
        if: always()
        run: az logout
        continue-on-error: true

  # ─── Build + deploy the React client ─────────────────────────────────
  deploy-client:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_MICROSOFT_CLIENT_ID: ${{ vars.VITE_MICROSOFT_CLIENT_ID }}
          VITE_APP_ENV: production
        run: npm run build

      # Static Web Apps deploy uses the SWA deployment token directly —
      # no azure/login needed. `skip_app_build` because we already built
      # the client above with the production VITE_* env vars.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client/dist
          skip_app_build: true
          output_location: ""

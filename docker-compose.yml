services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: scholarpath-sql
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:-ScholarPath_Dev_123!}
      MSSQL_PID: 'Developer'
    ports:
      - '1433:1433'
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: scholarpath-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword}
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-devpassword}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  sqlserver-data:
    driver: local
  redis-data:
    driver: local

name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          set -euo pipefail
          echo "Running lint"
          npm run lint

      - name: Type check
        run: |
          set -euo pipefail
          echo "Running TypeScript type check"
          npx tsc --noEmit

      - name: Run tests
        run: |
          set -euo pipefail
          echo "Running test suite"
          npm test

      - name: Build
        run: |
          set -euo pipefail
          echo "Running production build"
          npm run build
